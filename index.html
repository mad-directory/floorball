<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainingsplattform</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f4f6;
      color: #111827;
    }

    .hidden {
      display: none;
    }

    .center {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: white;
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .login-box h1 {
      margin-bottom: 10px;
      font-size: 36px;
    }

    .login-box p {
      color: #6b7280;
      margin-bottom: 30px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      margin-bottom: 18px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: black;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    .container {
      max-width: 1500px;
      margin: auto;
      padding: 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logout-btn {
      width: auto;
      padding: 10px 20px;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 25px;
    }

    .sidebar {
      background: white;
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      height: fit-content;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .list-box {
      background: #f3f4f6;
      padding: 15px;
      border-radius: 18px;
      margin-bottom: 15px;
    }

    .list-box h3 {
      margin-bottom: 10px;
      font-size: 18px;
    }

    .list-box ul {
      list-style: none;
    }

    .list-box li {
      margin-bottom: 6px;
      font-size: 14px;
    }

    .content {
      width: 100%;
    }

    .filters {
      background: white;
      padding: 25px;
      border-radius: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 25px;
    }

    .card {
      background: white;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .card h3 {
      margin-bottom: 15px;
      font-size: 24px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }

    .tag {
      background: #f3f4f6;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
    }

    .save-section {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    .save-btn {
      flex: 1;
    }

    .result-count {
      margin-bottom: 20px;
      font-weight: bold;
      font-size: 18px;
    }

    @media(max-width: 1000px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div id="loginPage" class="center">
  <div class="login-box">
    <h1>Login</h1>
    <p>Melde dich an, um alle Übungen zu sehen.</p>

    <input type="text" id="username" placeholder="Benutzername">
    <input type="password" id="password" placeholder="Passwort">

    <button onclick="login()">Anmelden</button>

    <div class="error" id="error"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="container">

    <div class="topbar">
      <div>
        <h1>Trainingsplattform</h1>
        <p>Alle Übungen und persönliche Listen</p>
      </div>

      <div class="user-info">
        <strong id="currentUser"></strong>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="layout">

      <div class="sidebar">
        <button onclick="showAllExercises()" style="margin-bottom:20px; background:#111827; color:white; width:100%;">
          Alle Übungen
        </button>
        <h2>Meine Listen</h2>
        <div id="listsContainer"></div>
      </div>

      <div class="content">

        <div class="filters">

          <div>
            <label>Feldspieler</label>
            <select id="fieldPlayersFilter">
              <option value="all">Alle</option>
            </select>
          </div>

          <div>
            <label>Goalies</label>
            <select id="goaliesFilter">
              <option value="all">Alle</option>
              <option value="0">0</option>
              <option value="1">1</option>
              <option value="2">2</option>
            </select>
          </div>

          <div>
            <label>Kernkompetenz</label>
            <select id="competencyFilter">
              <option value="all">Alle</option>
              <option value="Passen">Passen</option>
              <option value="Schießen">Schießen</option>
              <option value="Passen und Schießen">Passen und Schießen</option>
              <option value="Spielaufbau">Spielaufbau</option>
              <option value="Spielzüge">Spielzüge</option>
              <option value="Formation">Formation</option>
              <option value="Goalie">Goalie</option>
              <option value="Ballführung">Ballführung</option>
              <option value="Spiele">Spiele</option>
              <option value="Sonstige">Sonstige</option>
            </select>
          </div>

          <div>
            <label>Schwierigkeit</label>
            <select id="difficultyFilter">
              <option value="all">Alle</option>
            </select>
          </div>

          <div>
            <label>Spielfeldgröße</label>
            <select id="fieldSizeFilter">
              <option value="all">Alle</option>
              <option value="KF">KF</option>
              <option value="GF">GF</option>
            </select>
          </div>

        </div>

        <div class="result-count" id="resultCount"></div>

        <div class="gallery" id="gallery"></div>

      </div>
    </div>
  </div>
</div>

<script>

const users = [
  {
    username: 'trainer1',
    password: 'pass1',
    lists: {
      'Lieblingsübungen': [],
      'U15 Training': [],
      'Warmup': []
    }
  },
  {
    username: 'trainer2',
    password: 'pass2',
    lists: {
      'Goalie Übungen': [],
      'Technik': [],
      'Matchday': []
    }
  },
  {
    username: 'trainer3',
    password: 'pass3',
    lists: {
      'Schnelles Spiel': [],
      'Jugend': [],
      'Taktik': []
    }
  },
  {
    username: 'trainer4', password: 'pass4', lists: {'Liste A': [], 'Liste B': [], 'Liste C': []}
  },
  {
    username: 'trainer5', password: 'pass5', lists: {'Offensive': [], 'Defensive': [], 'Turnier': []}
  },
  {
    username: 'trainer6', password: 'pass6', lists: {'Spielzüge': [], 'Passen': [], 'Kondition': []}
  },
  {
    username: 'trainer7', password: 'pass7', lists: {'U13': [], 'U17': [], 'Elite': []}
  },
  {
    username: 'trainer8', password: 'pass8', lists: {'Montag': [], 'Mittwoch': [], 'Freitag': []}
  },
  {
    username: 'trainer9', password: 'pass9', lists: {'Top Übungen': [], 'Intensiv': [], 'Basics': []}
  },
  {
    username: 'trainer10', password: 'pass10', lists: {'Schüsse': [], 'Ballkontrolle': [], 'Powerplay': []}
  }
];

const photos = [
  {
    id: 1,
    title: 'Passübung Dreieck',
    image: 'https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=1200&auto=format&fit=crop',
    fieldPlayers: 6,
    goalies: 0,
    competency: 'Passen',
    difficulty: 3,
    fieldSize: 'KF'
  },
  {
    id: 2,
    title: 'Torschuss mit Goalie',
    image: 'https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=1200&auto=format&fit=crop',
    fieldPlayers: 8,
    goalies: 1,
    competency: 'Schießen',
    difficulty: 5,
    fieldSize: 'GF'
  },
  {
    id: 3,
    title: 'Spielaufbau unter Druck',
    image: 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1200&auto=format&fit=crop',
    fieldPlayers: 10,
    goalies: 2,
    competency: 'Spielaufbau',
    difficulty: 6,
    fieldSize: 'GF'
  },
  {
    id: 4,
    title: 'Ballführung Parcours',
    image: 'https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=1200&auto=format&fit=crop',
    fieldPlayers: 4,
    goalies: 0,
    competency: 'Ballführung',
    difficulty: 2,
    fieldSize: 'KF'
  },
  {
    id: 5,
    title: 'Formation und Laufwege',
    image: 'https://images.unsplash.com/photo-1547347298-4074fc3086f0?q=80&w=1200&auto=format&fit=crop',
    fieldPlayers: 9,
    goalies: 1,
    competency: 'Formation',
    difficulty: 4,
    fieldSize: 'GF'
  }
];

let currentUser = null;
let currentView = 'all';

function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const error = document.getElementById('error');

  error.textContent = '';

  const user = users.find(function(u) {
    return u.username === username && u.password === password;
  });

  if (user) {
    currentUser = user;

    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');

    document.getElementById('currentUser').textContent = 'Angemeldet als: ' + user.username;

    renderLists();
    renderPhotos();
  } else {
    error.textContent = 'Falscher Benutzername oder Passwort';
  }
}

// Enter-Taste für Login
window.addEventListener('keydown', function(event) {
  if (event.key === 'Enter' && !currentUser) {
    login();
  }
});

function logout() {
  location.reload();
}

const gallery = document.getElementById('gallery');
const resultCount = document.getElementById('resultCount');

const fieldPlayersFilter = document.getElementById('fieldPlayersFilter');
const goaliesFilter = document.getElementById('goaliesFilter');
const competencyFilter = document.getElementById('competencyFilter');
const difficultyFilter = document.getElementById('difficultyFilter');
const fieldSizeFilter = document.getElementById('fieldSizeFilter');

for(let i=0; i<=10; i++) {
  fieldPlayersFilter.innerHTML += `<option value="${i}">${i}</option>`;
}

for(let i=1; i<=7; i++) {
  difficultyFilter.innerHTML += `<option value="${i}">${i}</option>`;
}

function renderPhotos() {

  const fieldPlayers = fieldPlayersFilter.value;
  const goalies = goaliesFilter.value;
  const competency = competencyFilter.value;
  const difficulty = difficultyFilter.value;
  const fieldSize = fieldSizeFilter.value;

  let basePhotos = photos;

  if(currentView !== 'all') {
    const savedTitles = currentUser.lists[currentView];
    basePhotos = photos.filter(photo => savedTitles.includes(photo.title));
  }

  const filtered = basePhotos.filter(photo => {
    return (
      (fieldPlayers === 'all' || photo.fieldPlayers == fieldPlayers) &&
      (goalies === 'all' || photo.goalies == goalies) &&
      (competency === 'all' || photo.competency == competency) &&
      (difficulty === 'all' || photo.difficulty == difficulty) &&
      (fieldSize === 'all' || photo.fieldSize == fieldSize)
    );
  });

  if(currentView === 'all') {
    resultCount.textContent = `${filtered.length} Übungen gefunden`;
  } else {
    resultCount.textContent = `${filtered.length} Übungen in ${currentView}`;
  }

  gallery.innerHTML = filtered.map(photo => {

    const options = Object.keys(currentUser.lists)
      .map(list => `<option value="${list}">${list}</option>`)
      .join('');

    let actionSection = '';

    if(currentView === 'all') {
      actionSection = `
        ${actionSection}

        </div>
      </div>
    `;
  }).join('');
}

function saveToList(photoId) {

  const select = document.getElementById(`list-${photoId}`);
  const selectedList = select.value;

  const photo = photos.find(p => p.id === photoId);

  if(!currentUser.lists[selectedList].includes(photo.title)) {
    currentUser.lists[selectedList].push(photo.title);
  }

  renderLists();
}

function renderLists() {

  const container = document.getElementById('listsContainer');

  container.innerHTML = Object.entries(currentUser.lists)
    .map(([listName, items]) => `
      <div class="list-box" onclick="openList('${listName}')" style="cursor:pointer;">
        <h3>${listName}</h3>

        <ul>
          ${items.length === 0
            ? '<li>Keine Übungen gespeichert</li>'
            : items.map(item => `<li>• ${item}</li>`).join('')}
        </ul>
      </div>
    `)
    .join('');
}

fieldPlayersFilter.addEventListener('change', renderPhotos);
goaliesFilter.addEventListener('change', renderPhotos);
competencyFilter.addEventListener('change', renderPhotos);
difficultyFilter.addEventListener('change', renderPhotos);
fieldSizeFilter.addEventListener('change', renderPhotos);

function openList(listName) {
  currentView = listName;
  renderPhotos();
}

function showAllExercises() {
  currentView = 'all';
  renderPhotos();
}

function removeFromList(photoId, listName) {

  const photo = photos.find(p => p.id === photoId);

  currentUser.lists[listName] = currentUser.lists[listName]
    .filter(item => item !== photo.title);

  renderLists();
  renderPhotos();
}

</script>

</body>
</html>
