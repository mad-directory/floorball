<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Speiseplan</title>

<style>

body{
font-family:Arial;
margin:20px;
}

.header{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-bottom:20px;
}

button{
font-size:22px;
padding:6px 12px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
border:1px solid #ccc;
border-radius:8px;
padding:10px;
}

.date{
font-weight:bold;
margin-bottom:10px;
}

.today{
background:#eeeeee;
}

.meal{
padding:6px;
border-radius:6px;
margin-bottom:6px;
}

.past{
background:#ffb3b3;
}

.next{
background:#b6f5b6;
}

</style>
</head>

<body>

<div class="header">
<button onclick="changeWeek(-1)">⬅</button>
<h2 id="weekLabel">Speiseplan</h2>
<button onclick="changeWeek(1)">➡</button>
</div>

<div class="grid" id="plan"></div>

<script>

////////////////////////////////////////////////////////////
// HIER NUR DIE WOCHEN EINTRAGEN
////////////////////////////////////////////////////////////

const wochen = [

{
mittag_mo:"-",
abend_mo:"Grammlknödel mit Sauerkraut",

mittag_di:"Eier-Omeletten mit Frischkäse und Räucherlachs",
abend_di:"Kohlrabi-Käse-Schnitzel",

mittag_mi:"-",
abend_mi:"Kartoffelsuppe mit Frankfurter",

mittag_do:"Maria/Kartoffelsuppe",
abend_do:"Maria/Kartoffelsuppe",

mittag_fr:"Fleischstrudel",
abend_fr:"Fleischstrudel",

mittag_sa:"Kartoffelgulasch",
abend_sa:"Kartoffelgulasch",

mittag_so:"Karktoffelgulasch",
abend_so:"Faschierte Laibchen mit Kartoffelpürree",

// hier bestimmst du selbst die nächste mahlzeit
next:"abend_mi"
},
 mittag_mo:"Faschierte Laibchen mit Kartoffelpürree",
abend_mo:"Kasnocken",

mittag_di:"Kasnocken",
abend_di:"Steak mit Polenta-Taler",

mittag_mi:"",
abend_mi:"Gnocchi",

mittag_do:"",
abend_do:"",

mittag_fr:"",
abend_fr:"",

mittag_sa:"",
abend_sa:"",

mittag_so:"",
abend_so:"",

// hier bestimmst du selbst die nächste mahlzeit
next:""
}
];

////////////////////////////////////////////////////////////

const tage=["mo","di","mi","do","fr","sa","so"];

let weekIndex=0;

function changeWeek(offset){
weekIndex+=offset;
render();
}

function getMonday(date){
let d=new Date(date);
let day=d.getDay();
let diff=d.getDate()-day+(day==0?-6:1);
return new Date(d.setDate(diff));
}

function render(){

const plan=document.getElementById("plan");
plan.innerHTML="";

const today=new Date();
const monday=getMonday(today);

const week = wochen[((weekIndex % wochen.length) + wochen.length) % wochen.length];

for(let i=0;i<7;i++){

let dayDate=new Date(monday);
dayDate.setDate(monday.getDate()+i+weekIndex*7);

let tag=tage[i];

let div=document.createElement("div");
div.className="day";

if(dayDate.toDateString()==today.toDateString() && weekIndex==0){
div.classList.add("today");
}

let date=document.createElement("div");
date.className="date";

date.innerText = dayDate.toLocaleDateString("de-DE",{
weekday:"short",
day:"2-digit",
month:"2-digit"
});

let m=document.createElement("div");
m.className="meal";

let a=document.createElement("div");
a.className="meal";

m.innerText=week["mittag_"+tag] || "";
a.innerText=week["abend_"+tag] || "";

if(weekIndex==0){

const now=new Date();

let midTime=new Date(dayDate);
midTime.setHours(12,0,0);

let eveTime=new Date(dayDate);
eveTime.setHours(18,0,0);

if(midTime<now) m.classList.add("past");
if(eveTime<now) a.classList.add("past");

let keyMid="mittag_"+tag;
let keyAb="abend_"+tag;

if(week.next===keyMid) m.classList.add("next");
if(week.next===keyAb) a.classList.add("next");

}

div.appendChild(date);
div.appendChild(m);
div.appendChild(a);

plan.appendChild(div);

}

}

render();

</script>

</body>
</html>
